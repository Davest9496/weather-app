<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script
      src="https://kit.fontawesome.com/0666a8bc0c.js"
      crossorigin="anonymous"
      defer
    ></script>
  </head>
  <body>
    <div class="container">
      <div class="nav">
        <div class="nav__search">
          <div class="nav__search--1">
            <input
              placeholder="Search for location"
              type="text"
              name="search"
              class="nav__search--input"
              id="search"
            />
            <i class="fa-solid fa-magnifying-glass"></i>
          </div>
          <div class="nav__search--2">
            <h4>Popular</h4>
            <i class="fa-solid fa-angles-right"></i>
          </div>
        </div>

        <div class="nav__popular">
          <h3>Old Trafford</h3>
          <i class="fa-solid fa-angles-right"></i>
        </div>
        <div class="nav__popular">
          <h3>Old Trafford</h3>
          <i class="fa-solid fa-angles-right"></i>
        </div>
        <div class="nav__popular">
          <h3>Old Trafford</h3>
          <i class="fa-solid fa-angles-right"></i>
        </div>
      </div>

      <div class="app-container">
        <h2>london, england, united kingdom</h2>
        <div class="current">
          <div class="current__weather">
            <div class="current__weather--prt1">
              <div class="current__weather--img"></div>
            <div class="current__weather--figure"></div>
            </div>
            <div class="current__weather--prt2">
              <div class="current__weather--desc"></div>
              <div class="current__weather--feelslike"></div>
            </div>
            <h3>Bring an umbrella. It's going to rain. Blustery winds will accompany a high of 10°.</h3>
          </div>
          <div class="current__prepare">text</div>
        </div>

        <h1>n day forecast</h1>

        <div class="forecast">
          <div class="forecast__today">
            <div class="day__tag">
              <h3>Mon 21</h3>
            </div>

            <div class="forecast__today--box">
              <div class="forecast__container">
                <div class="forecast__day--img">
                  <i class="fa-solid fa-clouds"></i>
                  text
                </div>
                <div class="forecast__day--temp">
                  <div class="forecast__day--temp1">10</div>
                  <div class="forecast__day--temp2">5</div>
                </div>
              </div>

              <div class="forecast__details">TEXT HERE</div>
            </div>
          </div>

          <div class="forecast__day">
            <div class="day__tag">
              <h3>Mon 21</h3>
            </div>

            <div class="forecast__container">
              <div class="forecast__day--img">
                <i class="fa-solid fa-clouds"></i>
                text
              </div>
              <div class="forecast__day--temp">
                <div class="forecast__day--temp1">10</div>
                <div class="forecast__day--temp2">5</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
